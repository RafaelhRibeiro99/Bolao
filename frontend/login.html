<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Bolão Copa 2026</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a class="brand" href="./index.html"><span class="brand-mark"><img src="assets/trophy-login.png" alt="Taça Premium da Copa do Mundo"></span> Bolão Copa 2026</a>
      <div class="nav-menu">
        <a href="/index.html">Início</a>
        <a class="btn btn-primary" href="/cadastro.html">Criar conta</a>
      </div>
    </div>
  </nav>

  <main class="container auth-layout">
    <section class="auth-card">
      <h1><img src="assets/trionda.png" alt="Trionda" class="auth-title-icon"> Entrar no Bolão</h1>
      <p class="text-muted">Entre para apostar, acompanhar status e ver o ranking.</p>
      <form id="formLogin">
        <label>E-mail<input id="email" type="email" placeholder="seu@email.com" required></label>
        <label>Senha<input id="senha" type="password" placeholder="Sua senha" required></label>
        <button class="primary">Entrar</button>
      </form>
      <div class="actions" style="margin-top:18px; justify-content:center;">
        <a class="btn btn-success" href="/cadastro.html">Criar conta</a>
      </div>
      <div id="mensagem"></div>
    </section>
  </main>

  <footer class="footer">⚽ Bolão Copa do Mundo 2026</footer>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
