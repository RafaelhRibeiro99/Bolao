<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha | Bolão Copa 2026</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="public-screen">
  <nav class="navbar">
    <div class="nav-inner">
      <a class="brand" href="/index.html"><span class="brand-mark"><img src="assets/trophy-login.png" alt="Taça Premium da Copa do Mundo"></span> Bolão Copa 2026</a>
      <div class="nav-menu">
        <a href="/index.html">Início</a>
        <a class="btn btn-primary" href="/login.html">Entrar</a>
      </div>
    </div>
  </nav>

  <main class="container auth-layout">
    <section class="auth-card">
      <h1>Recuperar senha</h1>
      <p class="text-muted">Confirme o e-mail cadastrado e o telefone para trocar sua senha.</p>
      <form id="formRecuperar">
        <label>E-mail<input id="email" type="email" placeholder="seu@email.com" required></label>
        <label>Telefone<input id="telefone" inputmode="tel" placeholder="(00) 00000-0000" required></label>
        <label>Nova senha<input id="senha" type="password" placeholder="Mínimo 4 dígitos" required></label>
        <div class="password-strength" id="passwordStrength">
          <div class="strength-bar">
            <div class="strength-indicator" id="strengthIndicator"></div>
          </div>
          <div class="strength-text" id="strengthText">Mínimo 4 dígitos</div>
        </div>
        <label>Confirmar nova senha<input id="senhaConfirm" type="password" placeholder="Repita a nova senha" required></label>
        <button class="primary">Alterar senha</button>
      </form>
      <div id="mensagem"></div>
      <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <a class="btn btn-success" href="/login.html">Voltar para login</a>
        <a class="btn btn-success" href="/cadastro.html">Criar conta</a>
      </div>
    </section>
  </main>

  <footer class="footer">Bolão Copa do Mundo 2026</footer>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
